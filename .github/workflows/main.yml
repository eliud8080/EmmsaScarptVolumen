name: Scraping diario EMMSA

on:
  schedule:
    - cron: "0 13 * * *"   # 08:00 Perú (UTC-5)
  workflow_dispatch:

jobs:
  scraping:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1️⃣ Clonar repo
      - name: Checkout repo
        uses: actions/checkout@v4

      # 2️⃣ Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Dependencias
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install selenium pandas

      # 4️⃣ Instalar Chromium + driver correcto
      - name: Install Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium chromium-driver

      #  5️⃣ Variables de entorno (CLAVE)
      - name: Set Chrome paths
        run: |
          echo "CHROME_BIN=/usr/bin/chromium" >> $GITHUB_ENV
          echo "CHROMEDRIVER_PATH=/usr/bin/chromedriver" >> $GITHUB_ENV

      # 6️⃣ Ejecutar scraper
      - name: Scraper volumenes
        run: |
          python scraper2.py

      # 7️⃣ Commit automático
      - name: Commit CSVs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add ArchBIV/*.csv
          git commit -m "Update EMMSA CSVs" || echo "No changes"
          git push
